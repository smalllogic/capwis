    about:
      title: "关于我们"
      subtitle: "全球制造经验 · 美国本土支持"
      hero_title: "关于 SINOWER"
      hero_desc: "SINOWER USA 成立于 2025 年，总部位于佐治亚州，标志着我们向北美市场全球扩张的新阶段。我们的美国运营中心作为关键的分销中心和服务中心，为全美的经销商、分销商和餐饮服务专业人员提供支持。凭借超过 20 年的制造经验，SINOWER 将全球生产实力与本地库存和技术支持相结合，提供可靠的商用厨房设备解决方案。"
      heritage_title: "超过 20 年的制造专业知识"
      heritage_desc_1: "虽然 SINOWER USA 在美国是新成立的，但它拥有超过二十年的制造专业知识和国际市场经验。"
      heritage_desc_2: "我们的制造集团在欧洲和中东地区建立了强大的全球业务，在法国、德国、捷克、意大利、英国和迪拜（阿联酋）设有分公司。在过去的二十年里，我们建立了先进的生产能力、高效的运营体系和严格的质量控制标准，为全球分销商、OEM 合作伙伴和商业客户提供支持。"
      stats:
        years: "年制造经验"
        subsidiaries: "全球分公司"
      product_lines_title: "核心产品线"
      product_lines:
        refrigeration: "商用制冷设备"
        refrigeration_desc: "直插式冰箱、备餐台和台下式机组"
        cooking: "商用烹饪设备"
        cooking_desc: "专业炉灶、炸炉、平扒炉和烤箱"
        stainless: "不锈钢餐饮用品"
        stainless_desc: "操作台、水槽、货架和食品准备解决方案"
      value_title: "制造实力与竞争价值"
      value_desc_1: "凭借纵向一体化的生产和高效的成本管理，SINOWER 在保持强大制造标准和产品可靠性的同时，提供具有竞争力的工厂直供价格。"
      value_desc_2: "我们的佐治亚州仓库保持充足库存，确保全美市场的快速履行和稳定供应。此外，我们由工厂支持的工程和技术团队提供专业支持和可靠保修服务，帮助分销商和最终用户放心运营。"
      expansion_title: "美国战略扩张计划"
      expansion_desc: "SINOWER USA 致力于在美国建立强大的全国影响力。在未来三年内，我们计划在东西海岸共建立九个分公司及分销中心，以提高物流效率并提供更快速的本地化服务。"
      expansion_stats:
        offices: "分公司及分销中心"
        plan: "三年战略扩张计划"
        efficiency: "东西海岸物流效率"
      expansion_footer: "这一扩张战略将使我们能够缩短交付时间，增强技术支持能力，并与全国各地的经销商和分销商建立长期合作伙伴关系。"
      commitment_title: "我们的承诺"
      commitment_desc: "作为美国市场快速增长的品牌，SINOWER 致力于与经销商、分销商、承包商和餐饮服务运营商建立长期合作伙伴关系。我们相信可持续增长建立在透明度、可靠性和共同成功的基础之上。通过可靠的产品、稳定的供应和快速响应的支持，SINOWER 旨在成为美国餐饮服务行业值得信赖的设备合作伙伴。"
      become_dealer_title: "与为长期增长而打造的品牌合作。"
      become_dealer_desc: "SINOWER 为经销商提供具有竞争力的工厂直供价格、可靠的产品供应以及凭借 20 多年制造经验提供的强大技术支持。我们共同构建旨在扩张和长期成功的可持续合作伙伴关系。"
      apply_now: "立即申请"
      why_title: "为什么选择 SINOWER？"
      reasons:
        pricing:
          title: "竞争力的工厂直供价格"
          desc: "纵向一体化的制造结构使经销商能够保持可观的利润空间，同时以极具竞争力的价格获得可靠的设备。"
        support:
          title: "保修与技术支持"
          desc: "SINOWER 提供由工厂工程团队支持的可靠保修计划，确保经销商和最终用户的长期信心。"
        standards:
